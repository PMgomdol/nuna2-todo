<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conu Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo-wrap">
          <h1 class="logo">Conu <span>Todo</span></h1>
          <span class="today-chip" id="today-chip"></span>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="stat-number" id="total-count">0</span>
            <span class="stat-label">전체</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-number" id="done-count">0</span>
            <span class="stat-label">완료</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-number" id="remain-count">0</span>
            <span class="stat-label">남은 일</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main layout -->
    <div class="main-layout">

      <!-- Calendar -->
      <section class="calendar-section">
        <div class="cal-nav-row">
          <button class="cal-nav-btn" id="prev-month" aria-label="이전 달">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <h2 class="cal-title" id="cal-title"></h2>
          <button class="cal-nav-btn" id="next-month" aria-label="다음 달">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="cal-weekdays">
          <span class="sun">일</span>
          <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span>
          <span class="sat">토</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </section>

      <!-- Todo Section -->
      <section class="todo-section">

        <div class="todo-section-header">
          <div class="selected-date-info">
            <h3 class="selected-date-label" id="selected-date-label"></h3>
            <span class="date-badge" id="date-todo-count"></span>
          </div>
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행</button>
            <button class="filter-btn" data-filter="done">완료</button>
          </div>
        </div>

        <div class="input-section">
          <div class="input-wrapper">
            <input
              type="text"
              id="todo-input"
              class="todo-input"
              placeholder="할일을 입력하세요..."
              maxlength="80"
              autocomplete="off"
            />
            <button class="add-btn" id="add-btn" aria-label="추가">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <main class="todo-list-container">
          <ul class="todo-list" id="todo-list"></ul>
          <div class="empty-state" id="empty-state">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
              <circle cx="26" cy="26" r="25" stroke="#e2e8f0" stroke-width="2"/>
              <path d="M16 26h20M26 16v20" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <p class="empty-title">이 날의 할일이 없어요</p>
            <p class="empty-sub">위에서 할일을 추가해보세요</p>
          </div>
        </main>

        <footer class="footer">
          <button class="clear-btn" id="clear-done-btn">완료 항목 삭제</button>
        </footer>

      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
